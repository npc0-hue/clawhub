version: '3.8'

services:
  # ===========================================
  # 前端应用（Nitro 服务器）
  # ===========================================
  clawhub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clawhub-app
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      # 环境配置
      - NODE_ENV=production
      - BUN_ENV=production
      
      # Convex 配置（连接到本地 Convex 容器）
      - VITE_CONVEX_URL=http://convex:3216
      - VITE_CONVEX_SITE_URL=${SITE_URL:-http://localhost:3000}
      
      # 站点配置
      - SITE_URL=${SITE_URL:-http://localhost:3000}
      - CONVEX_SITE_URL=${SITE_URL:-http://localhost:3000}
      
      # Convex Auth（GitHub OAuth）
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET}
      
      # Convex Auth JWT keys
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWKS=${JWKS}
      
      # Embeddings
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      
      # 其他配置
      - VITE_SOULHUB_SITE_URL=${VITE_SOULHUB_SITE_URL:-}
      - VITE_SOULHUB_HOST=${VITE_SOULHUB_HOST:-}
      - VITE_SITE_MODE=${VITE_SITE_MODE:-production}
    depends_on:
      convex:
        condition: service_healthy
    networks:
      - clawhub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ===========================================
  # Convex 后端（自托管）
  # ===========================================
  convex:
    image: convex-internal:latest
    container_name: convex-backend
    restart: unless-stopped
    expose:
      - "3216"
    environment:
      # Convex 自托管配置
      - NODE_ENV=production
      - CONVEX_DEPLOYMENT_TYPE=self-hosted
      
      # 认证配置
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWKS=${JWKS}
      
      # 数据库配置
      - DATABASE_URL=postgresql://convex:convex_password@postgres:5432/convex?schema=convex
      
      # 存储配置
      - STORAGE_TYPE=local
      - STORAGE_PATH=/var/convex/storage
      
      # 向量搜索
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      
      # 其他
      - SITE_MODE=${SITE_MODE:-production}
    volumes:
      - convex-storage:/var/convex/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clawhub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3216/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ===========================================
  # PostgreSQL 数据库
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: clawhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: convex
      POSTGRES_PASSWORD: convex_password
      POSTGRES_DB: convex
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - clawhub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convex -d convex"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ===========================================
  # Redis（缓存，可选但推荐）
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: clawhub-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - clawhub-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

volumes:
  convex-storage:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  clawhub-network:
    driver: bridge
