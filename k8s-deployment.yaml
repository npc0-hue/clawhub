---
# Nginx 配置：/api/* 转发到 Convex，其余转发到 clawhub
apiVersion: v1
kind: ConfigMap
metadata:
  name: clawhub-nginx-config
  labels:
    app: clawhub
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      # /api/* 转发到 Convex Site
      location /api/ {
        proxy_pass https://secret-mandrill-759.convex.site;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
      }
      # 其余请求转发到 clawhub 应用
      location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawhub
  labels:
    app: clawhub
spec:
  replicas: 3
  selector:
    matchLabels:
      app: clawhub
  template:
    metadata:
      labels:
        app: clawhub
    spec:
      containers:
      # Nginx 入口：对外 80，内部分流
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        args: ["-g", "daemon off;"]
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
      - name: clawhub
        image: registry-harbor.yafex.cn/base/clawhub:v1-20260305110000
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: app
        # Embeddings
        # - name: OPENAI_API_KEY
        #   value: "sk-CNnVEDxEHPtw4uQfBkpHsUrqrrcCLOFRBMfcPCLHBjEJdrpN"
        # Deployment
        - name: CONVEX_DEPLOYMENT
          value: "secret-mandrill-759"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: nginx-config
        configMap:
          name: clawhub-nginx-config
